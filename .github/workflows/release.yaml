name: Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      tag:
        description: 'New tag name'
        required: true

permissions:
  contents: write

env:
  # Necessary for most environments as build failure can occur due to OOM issues
  NODE_OPTIONS: "--max-old-space-size=4096"
  APP_NAME: "certicopy"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        build:
          - name: 'certicopy'
            platform:  'linux/amd64'
            os: 'ubuntu-latest'
          - name: 'certicopy'
            platform:  'windows/amd64'
            os: 'windows-latest'
          - name: 'certicopy'
            platform:  'darwin/universal'
            os: 'macos-latest'
            
    runs-on: ${{ matrix.build.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
    
      - name: Get Tag Name
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Use the input value for manual builds
            echo "TAG_NAME=${{ github.event.inputs.tag }}" >> $GITHUB_ENV
          else
            # Extract tag from the git ref for tag pushes
            echo "TAG_NAME=${{ github.ref_name }}" >> $GITHUB_ENV
          fi

      - name: Set Binary Name
        shell: bash
        run: |
          # Replace slashes in platform for the filename (e.g., windows/amd64 -> windows-amd64)
          PLATFORM_STR=$(echo "${{ matrix.build.platform }}" | tr '/' '-')
          echo "BASE_NAME=${{ env.APP_NAME }}-${TAG_NAME}-${PLATFORM_STR}" >> $GITHUB_ENV

      - name: Install Linux dependencies
        if: matrix.build.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config build-essential
          
      - name: Build wails
        uses: dAppCore/build/actions/build/wails2@v4.0.0
        id: build
        with:
          build-name: ${{ matrix.build.name }}
          build-platform: ${{ matrix.build.platform }}
          package: true
          go-version: '1.24'
          node-version: '25'
          # Use build-args to pass the webkit2_41 tag needed for Ubuntu 24.04
          build-args: ${{ matrix.build.os == 'ubuntu-latest' && '-tags webkit2_41' || '' }}
      
      - name: Debug - List build directory
        shell: bash
        run: |
          echo "Matrix Platform: ${{ matrix.build.platform }}"
          PLATFORM_DIR=$(echo "${{ matrix.build.platform }}" | tr '/' '-')
          echo "Calculated Platform Dir: ${PLATFORM_DIR}"
          echo "Expected Source Dir: build/bin/${PLATFORM_DIR}"
          echo ""
          echo "--- Binary Search (including directories) ---"
          find build -name "certicopy*"
          echo ""
          echo "--- Recursive listing of build/bin ---"
          ls -R build/bin

      - name: Prepare Artifacts
        shell: bash
        run: |
          # The subdirectory name matches the platform with slashes replaced by dashes
          PLATFORM_DIR=$(echo "${{ matrix.build.platform }}" | tr '/' '-')
          SOURCE_DIR="build/bin/${PLATFORM_DIR}"
          
          echo "Expected source directory: ${SOURCE_DIR}"

          if [[ "${{ matrix.build.os }}" == *"windows"* ]]; then
            # Windows: built file is certicopy.exe in the platform subdir
            mv "${SOURCE_DIR}/${{ matrix.build.name }}.exe" "build/bin/${BASE_NAME}.exe"
            echo "ASSET_PATH=build/bin/${BASE_NAME}.exe" >> $GITHUB_ENV
          elif [[ "${{ matrix.build.os }}" == *"macos"* ]]; then
            # macOS: can be a .app folder or a binary
            if [ -d "${SOURCE_DIR}/${{ matrix.build.name }}.app" ]; then
              (cd "${SOURCE_DIR}" && zip -r "${{ github.workspace }}/build/bin/${BASE_NAME}.app.zip" "${{ matrix.build.name }}.app")
              echo "ASSET_PATH=build/bin/${BASE_NAME}.app.zip" >> $GITHUB_ENV
            else
              mv "${SOURCE_DIR}/${{ matrix.build.name }}" "build/bin/${BASE_NAME}"
              echo "ASSET_PATH=build/bin/${BASE_NAME}" >> $GITHUB_ENV
            fi
          else
            # Linux: built binary in platform subdir
            mv "${SOURCE_DIR}/${{ matrix.build.name }}" "build/bin/${BASE_NAME}"
            echo "ASSET_PATH=build/bin/${BASE_NAME}" >> $GITHUB_ENV
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.TAG_NAME }}
          files: ${{ env.ASSET_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}