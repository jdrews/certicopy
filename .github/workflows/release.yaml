name: Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      tag:
        description: 'New tag name'
        required: true
        default: 'v0.0.0'

permissions:
  contents: write

env:
  # Necessary for most environments as build failure can occur due to OOM issues
  NODE_OPTIONS: "--max-old-space-size=4096"
  APP_NAME: "certicopy"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        build:
          - name: 'certicopy'
            platform:  'linux/amd64'
            os: 'ubuntu-latest'
          - name: 'certicopy'
            platform:  'windows/amd64'
            os: 'windows-latest'
          - name: 'certicopy'
            platform:  'darwin/universal'
            os: 'macos-latest'
            
    runs-on: ${{ matrix.build.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
    
      - name: Get Tag Name
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Use the input value for manual builds
            echo "TAG_NAME=${{ github.event.inputs.tag }}" >> $GITHUB_ENV
          else
            # Extract tag from the git ref for tag pushes
            echo "TAG_NAME=${{ github.ref_name }}" >> $GITHUB_ENV
          fi

      - name: Validate Tag Name
        shell: bash
        run: |
          if [[ ! "${TAG_NAME}" =~ ^v ]]; then
            echo "::error::Tag name '${TAG_NAME}' is invalid. It must start with 'v' (e.g., v1.2.3)."
            exit 1
          fi

      - name: Set Binary Name
        shell: bash
        run: |
          # Replace slashes in platform for the filename (e.g., windows/amd64 -> windows-amd64)
          PLATFORM_STR=$(echo "${{ matrix.build.platform }}" | tr '/' '-')
          echo "BASE_NAME=${{ env.APP_NAME }}-${TAG_NAME}-${PLATFORM_STR}" >> $GITHUB_ENV

      - name: Install Linux dependencies
        if: matrix.build.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config build-essential
          
      - name: Build wails
        uses: dAppCore/build/actions/build/wails2@v4.0.0
        id: build
        with:
          build-name: ${{ matrix.build.name }}
          build-platform: ${{ matrix.build.platform }}
          package: true
          go-version: '1.24'
          node-version: '25'
          # Use build-args to pass the webkit2_41 tag needed for Ubuntu 24.04
          build-args: ${{ matrix.build.os == 'ubuntu-latest' && '-tags webkit2_41' || '' }}

      - name: Prepare Artifacts
        shell: bash
        run: |
          # Based on debug logs, all artifacts are directly in build/bin/
          SOURCE_DIR="build/bin"
          
          if [[ "${{ matrix.build.os }}" == *"windows"* ]]; then
            # Windows: built file was found as 'certicopy' or 'certicopy.exe'. 
            # We ensure it has a proper .exe extension for the release.
            if [ -f "${SOURCE_DIR}/${{ matrix.build.name }}.exe" ]; then
              mv "${SOURCE_DIR}/${{ matrix.build.name }}.exe" "${SOURCE_DIR}/${BASE_NAME}.exe"
            else
              mv "${SOURCE_DIR}/${{ matrix.build.name }}" "${SOURCE_DIR}/${BASE_NAME}.exe"
            fi
            echo "ASSET_PATH=${SOURCE_DIR}/${BASE_NAME}.exe" >> $GITHUB_ENV
            
          elif [[ "${{ matrix.build.os }}" == *"macos"* ]]; then
            # macOS: debug showed 'certicopy.app.zip' already exists (likely from package: true)
            if [ -f "${SOURCE_DIR}/${{ matrix.build.name }}.app.zip" ]; then
              mv "${SOURCE_DIR}/${{ matrix.build.name }}.app.zip" "${SOURCE_DIR}/${BASE_NAME}.app.zip"
            elif [ -d "${SOURCE_DIR}/${{ matrix.build.name }}.app" ]; then
              (cd "${SOURCE_DIR}" && zip -r "${BASE_NAME}.app.zip" "${{ matrix.build.name }}.app")
            else
              mv "${SOURCE_DIR}/${{ matrix.build.name }}" "${SOURCE_DIR}/${BASE_NAME}"
            fi
            
            if [ -f "${SOURCE_DIR}/${BASE_NAME}.app.zip" ]; then
              echo "ASSET_PATH=${SOURCE_DIR}/${BASE_NAME}.app.zip" >> $GITHUB_ENV
            else
              echo "ASSET_PATH=${SOURCE_DIR}/${BASE_NAME}" >> $GITHUB_ENV
            fi
            
          else
            # Linux: rename binary to be descriptive
            mv "${SOURCE_DIR}/${{ matrix.build.name }}" "${SOURCE_DIR}/${BASE_NAME}"
            echo "ASSET_PATH=${SOURCE_DIR}/${BASE_NAME}" >> $GITHUB_ENV
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.TAG_NAME }}
          files: ${{ env.ASSET_PATH }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}